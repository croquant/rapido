{% load i18n org_switcher %}{% get_org_switcher_memberships request.user as switcher_memberships %}{% if switcher_memberships %}<form method="get" action="{% url 'core:org_picker' %}" class="org-switcher" role="navigation" x-data>
<select name="next" aria-label="{% trans 'Switch organisation' %}" x-on:change="$el.form.submit()">{% for m in switcher_memberships %}<option value="/o/{{ m.organization.slug }}/"{% if request.organization and request.organization.slug == m.organization.slug %} selected{% endif %}>{{ m.organization.name }}</option>{% endfor %}</select>
<noscript><button type="submit" class="secondary">{% trans "Switch" %}</button></noscript>
</form>{% elif request.organization %}<span class="nav-org">{{ request.organization.name }}</span>{% endif %}
